<!-- Activity Feed Panel (F-EXT-05) -->
<div class="tf-activity-panel">
  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h6 class="fw-bold mb-0" style="color:var(--tf-text);">
      <i class="bi bi-clock-history me-2" style="color:var(--tf-accent);"></i>Activity Feed
    </h6>
    <button class="btn btn-outline-primary btn-sm" (click)="refresh()">
      <i class="bi bi-arrow-clockwise me-1"></i> Refresh
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="text-center py-3">
    <div class="spinner-border spinner-border-sm text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <span class="ms-2 text-muted small">Loading activity...</span>
  </div>

  <!-- Activity List -->
  <div *ngIf="!isLoading" class="tf-activity-list-wrap">
    <div *ngIf="activities.length === 0" class="text-muted text-center small py-4">
      <i class="bi bi-clock-history d-block mb-2" style="font-size:2rem;"></i>
      No activity yet.
    </div>

    <div class="tf-activity-list">
      <div *ngFor="let activity of activities" class="tf-activity-item d-flex gap-3 py-2 px-1">
        <!-- Colored Circular Icon -->
        <div class="tf-activity-circle flex-shrink-0 d-flex align-items-center justify-content-center rounded-circle"
             [ngClass]="getActionCircleClass(activity.actionCode)">
          <i class="bi" [ngClass]="getActionIcon(activity.actionCode)" style="font-size:0.75rem;"></i>
        </div>

        <!-- Content -->
        <div class="flex-grow-1">
          <p class="mb-0 small" style="color: var(--tf-text);">
            <strong>{{ activity.actorName || 'System' }}</strong>
            {{ activity.message }}
          </p>
          <span class="text-muted" style="font-size: 0.7rem;">
            {{ activity.createdAt | relativeTime }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
