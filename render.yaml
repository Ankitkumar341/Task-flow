services:
  - type: web
    name: taskflow-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionURI
      - key: DATABASE_USERNAME
        fromDatabase:
          name: taskflow-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: taskflow-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://taskflow-XXXX.vercel.app
      - key: DDL_AUTO
        value: update
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: taskflow-db
    databaseName: taskflow
    plan: free
